description: >-
  Paperclip is open-source orchestration for zero-human companies. It is a
  Node.js server with a React UI that coordinates teams of AI agents (Claude
  Code, Codex, OpenClaw, Cursor, and more) to autonomously run businesses.


  Features:

  - Org charts & governance — hierarchies, approval workflows, audit trails

  - Budget control — token and cost tracking with hard stops

  - Task management — issue-based ticket system with persistent context

  - Heartbeat execution — scheduled agent wake-ups and event-triggered work

  - Multi-company support — single deployment, per-company data isolation

  - Skill injection — runtime capability loading without retraining


  The container ships with an embedded PostgreSQL database, so no external
  database is required to get started.

