version: "3.7"

services:

  app_proxy:
    environment:
      APP_HOST: raccommode-paperclip_server_1
      APP_PORT: 3100

  init:
    image: alpine:3.20
    user: "0:0"
    command: ["sh", "-c", "mkdir -p /paperclip && chown -R 1000:1000 /paperclip"]
    volumes:
      - ${APP_DATA_DIR}/data:/paperclip

  server:
    image: ghcr.io/paperclipai/paperclip:latest
    restart: on-failure
    stop_grace_period: 1m
    depends_on:
      init:
        condition: service_completed_successfully
    environment:
      USER_UID: "1000"
      USER_GID: "1000"
      HOST: 0.0.0.0
      PORT: "3100"
      SERVE_UI: "true"
      PAPERCLIP_HOME: /paperclip
      PAPERCLIP_DEPLOYMENT_MODE: authenticated
      PAPERCLIP_DEPLOYMENT_EXPOSURE: private
      BETTER_AUTH_SECRET: ${APP_SEED}
    volumes:
      - ${APP_DATA_DIR}/data:/paperclip
