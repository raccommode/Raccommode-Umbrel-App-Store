version: "3.7"

services:

  app_proxy:
    environment:
      APP_HOST: raccommode-paperclip_server_1
      APP_PORT: 3100

  server:
    image: ghcr.io/paperclipai/paperclip:latest
    restart: on-failure
    stop_grace_period: 1m
    entrypoint:
      - /bin/sh
      - -ec
      - |
        mkdir -p /paperclip
        chown -R 1000:1000 /paperclip
        if [ ! -s /paperclip/.better-auth-secret ]; then
          head -c 48 /dev/urandom | base64 | tr -d '\n=' > /paperclip/.better-auth-secret
          chown 1000:1000 /paperclip/.better-auth-secret
          chmod 600 /paperclip/.better-auth-secret
        fi
        export BETTER_AUTH_SECRET="$$(cat /paperclip/.better-auth-secret)"
        exec docker-entrypoint.sh "$$@"
      - --
    command:
      - sh
      - -ec
      - |
        MARKER=/paperclip/.umbrel-bootstrap-done
        INVITE_FILE=/paperclip/admin-invite-url.txt
        (
          until curl -fsS http://127.0.0.1:3100/api/health -o /tmp/h.json 2>/dev/null; do
            sleep 2
          done
          if [ -f "$$MARKER" ]; then exit 0; fi
          STATUS=$$(jq -r '.bootstrapStatus // "ready"' < /tmp/h.json)
          if [ "$$STATUS" = "bootstrap_pending" ]; then
            OUT=$$(cd /app && pnpm -s paperclipai auth bootstrap-ceo \
                     --data-dir /paperclip \
                     --base-url "$$PAPERCLIP_PUBLIC_URL" 2>&1 || true)
            URL=$$(printf '%s\n' "$$OUT" | grep -oE 'https?://[^[:space:]]+/invite/pcp_bootstrap_[A-Za-z0-9]+' | tail -n1)
            if [ -n "$$URL" ]; then
              printf '%s\n' "$$URL" > "$$INVITE_FILE"
              chmod 600 "$$INVITE_FILE" || true
              printf '\n========================================\n'
              printf '   PAPERCLIP FIRST-RUN ADMIN INVITE\n'
              printf '   Open this URL once to claim CEO:\n'
              printf '   %s\n' "$$URL"
              printf '========================================\n\n'
              touch "$$MARKER"
            fi
          else
            touch "$$MARKER"
          fi
        ) &
        exec node --import ./server/node_modules/tsx/dist/loader.mjs server/dist/index.js
    environment:
      USER_UID: "1000"
      USER_GID: "1000"
      HOST: 0.0.0.0
      PORT: "3100"
      SERVE_UI: "true"
      PAPERCLIP_HOME: /paperclip
      PAPERCLIP_DEPLOYMENT_MODE: authenticated
      PAPERCLIP_DEPLOYMENT_EXPOSURE: public
      PAPERCLIP_PUBLIC_URL: "http://${DEVICE_DOMAIN_NAME}:${APP_PROXY_PORT}"
    volumes:
      - ${APP_DATA_DIR}/data:/paperclip
